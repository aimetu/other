#💡建立分流策略组
;以下为策略组"policy"部分
;static策略组中，你需要手动选择想要的节点/策略组。
;available策略组将按顺序选择你列表中第一个可用的节点。
;round-robin策略组，将按列表的顺序轮流使用其中的节点。
;url-latency-benchmark延迟策略组，选取延迟最优节点。
;dest-hash策略组，随机负载均衡，但相同域名走固定节点。
;ssid策略组，将根据你所设定的网络来自动切换节点/策略组
;img-url参数用于指定策略组图标，可远程，也可本地/iCloud(Quantumult X/Images路径下)（108*108 大小）
;check-interval为网络测试时间参数，单位秒, 默认更新时间为60*10=600秒，也就是10分钟
;direct/proxy/reject则只能用本地图标，名字分别为direct.png, proxy.png,reject.png放置于Images文件夹下即可生效 (108*108 大小)
[policy]
static=⛵节点选择, 🚁自动选择, 🇭🇰香港节点, 🇹🇼台湾节点, 🇯🇵日本节点, 🇰🇷韩国节点, 🇸🇬狮城节点, 🇺🇸国际节点, 🇨🇳中国节点, direct, proxy, reject, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Quantumult_X.png
url-latency-benchmark=🚁自动选择, server-tag-regex=(?=.*((?i))), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Auto.png
url-latency-benchmark=🇭🇰香港节点, server-tag-regex=(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美)).)*$, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Hong_Kong.png
