#建立分流策略组
;static策略组:手动选择想要的节点/策略组
;available策略组:按顺序选择列表中第一个可用的节点
;round-robin策略组:按列表的顺序轮流使用其中的节点
;url-latency-benchmark延迟策略组:选取延迟最优节点
;dest-hash策略组:随机负载均衡,相同域名走固定节点
;ssid策略组:根据设定的网络自动切换节点/策略组
;img-url参数用于指定策略组图标，可远程,也可本地/iCloud(Quantumult X/Images路径下)（108*108 大小）
;check-interval为网络测试时间参数，单位秒, 默认更新时间为60*10=600秒，也就是10分钟
;direct/proxy/reject则只能用本地图标，名字分别为direct.png, proxy.png,reject.png放置于Images文件夹下即可生效 (108*108 大小)
[policy]
static=Pick, Auto, Hongkong, Taiwan, Japan, Korean, Singapore, 🇺Global, China, direct, proxy, reject, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Quantumult_X.png
url-latency-benchmark=Auto, server-tag-regex=(?=.*((?i))), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Auto.png
url-latency-benchmark=Hongkong, server-tag-regex=(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美)).)*$, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Hong_Kong.png
url-latency-benchmark=Taiwan, server-tag-regex=(?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/TW.png
url-latency-benchmark=Japan, server-tag-regex=(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Japan.png
url-latency-benchmark=Korean, server-tag-regex=(?=.*(韩国|韓國|朝鲜|KR|(?i)Korean))^((?!(台|日|港|新|美)).)*$, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Korea.png
