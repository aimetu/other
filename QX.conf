;general模块内为一些通用的设置参数项
[general]
;Quantumult X会对server_check_url指定的网址进行相应测试，以确认节点的可用性
;你同样可以在server_local/remote中，为节点订阅单独指定server_check_url参数
;节点网络测试&节点服务测试&设置图标显示
network_check_url=http://www.qualcomm.cn/generate_204
server_check_url=http://www.gstatic.com/generate_204
profile_img_url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png

;节点延迟测试超时参数，需小于5000毫秒才生效
server_check_timeout=3000

;资源解析器可用于自定义各类远程资源的转换，如节点，规则filter，复写rewrite等，url地址可远程，可本地/iCloud(Quantumult X/Scripts目录)
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

;geo_location_checker用于节点页面的节点信息展示，可完整自定义展示内容与方式
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js

;运行模式模块running_mode_trigger设置，即根据网络自动切换"分流/直连/全局代理"等模式
;running-mode-trigger模式下，跟手动切换直连/全局代理等效，rewrite/task 模块始终会生效，比ssid策略组设置简单，比ssid-suspend更灵活
;前两个filter先后表示 在4G网络跟一般Wi-Fi下，走filter(分流)模式，后面则表示在OpenWrt_5G下切换为全局直连，OpenWrt切换为全局代理
;如需使用，相应SSID换成你自己Wi-Fi名即可
;running_mode_trigger=filter, filter, OpenWrt_5G:all_direct, OpenWrt:all_proxy

;ssid_suspended_list，让Quantumult X在特定Wi-Fi网络下暂停工作(仅task模块会继续工作)，多个Wi-Fi用“,”连接
;ssid_suspended_list=OpenWrt_5G, OpenWrt

;dns_exclusion_list中的域名将不使用fake-ip方式,其它域名则全部采用fake-ip及远程解析的模式
;dns_exclusion_list=*.qq.com

;UDP白名单，留空则默认所有端口,不在列表中的将被丢弃处理返回"ICMP端口不可达"信息
udp_whitelist=53, 80-427, 444-65535

;UDP_Drop名单，同白名单类似，但不会返回"ICMP端口不可达"信息
;Drop名单仅处理whitelist名单中的端口
udp_drop_list=1900, 80

#参数fallback_udp_policy的值仅支持末端策略（末端策略为经由规则模块和策略模块后所命中的策略，例如：direct、reject 以及节点；不支持内置策略proxy以及其它自定义策略）
fallback_udp_policy=direct

;下列表中的内容将不经过Quantumult X的处理
excluded_routes= 192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8
icmp_auto_reply=true

;指定DoH请求所使用的User-Agent
;doh_user_agent=Agent/1.0

;指定服务器测试时所使用的User-Agent
;server_check_user_agent=Agent/1.0

#本地DNS服务器
[dns]
;禁用系统DNS或ipv6
;no-system
no-ipv6

;指定DNS服务器，并发响应选取最优结果
server=1.2.4.8
server=223.5.5.5
server=119.29.29.29

;当设置Doh服务器时，所有"未指定"的服务器将失效
;doh-server=https://doh.pub/dns-query
;doh-server=https://dns.alidns.com/dns-query

;1.0.29版本后支持多个doh并发
;doh-server=https://dns.alidns.com/dns-query, https://doh.pub/dns-query

;1.0.29版本后支持alias映射类型
;alias=/example.com/another-example.com

;支持参数excluded_ssids,included_ssids(1.0.29以上版本)指定在特定Wi-Fi下失效/生效
;doh-server=https://dns.alidns.com/dns-query,https://doh.pub/dns-query,excluded_ssids=OpenWrt_5G, OpenWrt
;doh-server=https://dns.alidns.com/dns-query,https://doh.pub/dns-query,included_ssids=OpenWrt_5G, OpenWrt

;指定域名解析dns,下面为示范,同样支持excluded_ssids/included_ssids参数
server=/*.taobao.com/223.5.5.5
server=/*.tmall.com/223.5.5.5
server=/*.alipay.com/223.5.5.5
server=/*.qq.com/119.29.29.29
;server=/*.qq.com/119.29.29.29, included_ssids=OpenWrt_5G, OpenWrt
;server=/*.taobao.com/223.5.5.5, excluded_ssids=OpenWrt_5G, OpenWrt

