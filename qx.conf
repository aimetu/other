#💡机场服务器远程订阅
[server_remote]
#远程服务器订阅模块,可直接订阅ssr，ss链接,以及quantumult x格式的vmess/trojan/https订阅
#其它格式可用opt-parser参数开启解析器导入使用
#img-url参数用于指定图标，格式要求同样为108*108的png图片，可远程可本地
#"tag"跟"enabled"为可选参数，分别表示 “标签”及“开启状态”, true为开启，false关闭
#update-interval为更新时间参数，单位"秒", 默认更新时间为24*60*60=86400秒，也就是24小时
#opt-parser=true/false 用于控制是否对本订阅开启资源解析器，不写或者false表示不启用解析器

