#💡本地服务器部分
[server_local]
;目前支持shadowsocks/shadowsocksR/vmess/trojan/http(s)/socks5等类型

#💡本地分流规则「对于完全相同的某条规则，本地的将优先生效」
[filter_local]
host-suffix, local, china
host-keyword, cokemv, china
host-keyword, btbdys, china
host-keyword, gimytv, china
host-keyword, libvio, china
host-keyword, ddrk, china

//强制分流走蜂窝网络
;host-suffix, googleapis.com, global, force-cellular

//让分流走蜂窝网络跟wi-fi中的优选结果
;host-suffix, googleapis.com, global, multi-interface

//让分流走蜂窝网络跟wi-fi中的负载均衡，提供更大带宽出入接口
;host-suffix, googleapis.com, global, multi-interface-balance

//指定分流走特定网络接口
;host-suffix, googleapis.com, global, via-interface=pdp_ip0

//%TUN%参数，回传给quantumult x接口，可用于曲线实现代理链功能
;host-suffix, example.com, ServerA, via-interface=%TUN%
;ip-cidr, ServerA's IP Range, ServerB

//ip规则
ip-cidr, 10.0.0.0/8, china
ip-cidr, 127.0.0.0/8, china
ip-cidr, 172.16.0.0/12, china
ip-cidr, 192.168.0.0/16, china
ip-cidr, 224.0.0.0/24, china

//ipv6规则
ip6-cidr, fe80::/10, china

#🇨🇳已采用"chinaips"分流规则，因此注释掉geoip cn
;geoip, cn, china

#🗺️支持如下的geoip库写法"需geo-ip库支持"
;geoip, netflix, global

#🐟不在规则中的请求，走final指定策略
final, final

#💡本地http服务器
[http_backend]
https://raw.githubusercontent.com/chavyleung/scripts/master/chavy.box.js, tag=🗂️boxjs, path=^/, enabled=true

#💡本地复写规则
[rewrite_local]
https:\/\/((weather-data\.apple)|(api.weather))\.com url script-request-header https://raw.githubusercontent.com/Peng-YM/QuanX/master/Tasks/caiyun.js

#💡以下为证书&主机名,自行在mitm中生成安装并信任
[mitm]
skip_validating_cert = false
force_sni_domain_name = false
hostname = weather-data.apple.com, api.weather.com
