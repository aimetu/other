#💡建立分流策略组
;static策略组:手动选择想要的节点/策略组
;available策略组:按顺序选择列表中第一个可用的节点
;round-robin策略组:按列表的顺序轮流使用其中的节点
;url-latency-benchmark延迟策略组:选取延迟最优节点
;dest-hash策略组:随机负载均衡,相同域名走固定节点
;ssid策略组:根据设定的网络自动切换节点/策略组
;img-url参数用于指定策略组图标，可远程,也可本地/icloud(quantumult x/images路径下)（108*108 大小）
;check-interval为网络测试时间参数，单位秒, 默认更新时间为60*10=600秒，也就是10分钟
;direct/proxy/reject则只能用本地图标，名字分别为direct.png, proxy.png,reject.png放置于images文件夹下即可生效 (108*108 大小)
[policy]
static=pick, auto, hongkong, taiwan, japan, korean, singapore, american, chinese, direct, proxy, reject, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Quantumult_X.png
url-latency-benchmark=auto, server-tag-regex=(?i), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Auto.png
url-latency-benchmark=hongkong, server-tag-regex=(?i)(港|香港|HK|Hong), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Hong_Kong.png
url-latency-benchmark=taiwan, server-tag-regex=(?i)(台|台湾|台北|TW|Taiwan), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Taiwan.png
url-latency-benchmark=japan, server-tag-regex=(?i)(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Japan.png
url-latency-benchmark=korean, server-tag-regex=(?i)(韩国|韓國|朝鲜|KR|Korean), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Korea.png
url-latency-benchmark=singapore, server-tag-regex=(?i)(新加坡|狮城|SG|Singapore), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Singapore.png
