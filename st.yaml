# >2022.07.15
# 配置样例:https://stash.wiki/features/example-config

#💡 通用设置
# 网络模式:rule规则/global代理/direct直连
mode: rule

# 日志模式:silent静默/info信息/warning警告/error错误/debug调试
log-level: info

#💡 dns服务器配置
dns:
  skip-cert-verify: true
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.example'
    - '*.invalid'
    - '*.localhost'
    - '*.test'
    - '*.local'
    - '*.home.arpa'

  default-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# 域名使用指定的dns服务器解析
  nameserver-policy:
    mtalk.google.com: 108.177.125.188
    '*testflight.apple.com': 23.76.66.98
    
# 本地域名映射
hosts:
  '*.clash.dev': 127.0.0.1
  xp.apple.com: 127.0.0.1
  ocsp.apple.com: 127.0.0.1
  mesu.apple.com: 127.0.0.1
  gdmf.apple.com: 127.0.0.1

# 使用python脚本编写自定义规则
script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443  # 屏蔽http3/quic,让流量回落至http2,避免udp被qos

#💡 http引擎相关
http:
# 强制使用http引擎处理tcp连接 
  force-http-engine:
    - boxjs.com:80
    - boxjs.net:80

# 开启mitm功能的域名列表,需要确保上述证书已安装受信任
  mitm:
    - g.cn
    - '*.google.cn'
    - boxjs.com
    - boxjs.net
    - sub.store
    - '*.tiktokv.com'
    - '*.byteoversea.com'
    - '*.tik-tokapi.com'
    
# http(s)重写支持header、302、307、reject多种策略
  url-rewrite:
    - ^http://g\.cn http://www.google.com header
    - ^https?://www\.google\.cn https://www.google.com 302
    - (?<=_region=)CN(?=&) KR 307
    - (?<=&mcc_mnc=)4 2 307
    - ^(https?:\/\/(tnc|dm)[\w-]+\.\w+\.com\/.+)(\?)(.+) $1$3 302
    - (^https?:\/\/*\.\w{4}okv.com\/.+&.+)(\d{2}\.3\.\d)(.+) $118.0$3 302

# 使用javascript脚本改写http(s)请求
  script:
    - match: https?:\/\/boxjs\.(com|net)
      name: boxjs
      type: request
      require-body: true
      timeout: 120

    - match: ^https?:\/\/sub\.store
      name: sub-store
      type: request
      require-body: true
      timeout: 120

# 首页tile面板
tiles:
  - name: network-tile
    interval: 3600
    title: 网络信息查询
    content: 正在查询请稍候
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Domestic.png
    backgroundColor: '#00a6ac'
    
  - name: timecard-tile
    interval: 86400
    title: 节假日信息查询
    content: 漫长的等待中
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Daily.png
    backgroundColor: '#b3424a'

# 远程资源模式
script-providers:
  boxjs:
    url: https://raw.githubusercontent.com/chavyleung/scripts/master/box/chavy.boxjs.js
    interval: 86400
    
  sub-store:
    url: https://github.com/sub-store-org/Sub-Store/releases/latest/download/sub-store.min.js
    interval: 86400

  network-tile:
    url: https://raw.githubusercontent.com/aimetu/other/main/network.js
    interval: 86400

  timecard-tile:
    url: https://raw.githubusercontent.com/smartmimi/conf/master/surge/timecard.js
    interval: 86400

#💡 代理服务信息在主页显示
subscribe-url: 订阅链接

#💡 远程代理服务订阅链接
proxy-providers:
  stash:
    type: http
# 本地sub.store订阅
    url: https://sub.store/download/collection/stash
# 远程在线订阅   
#   url: https://sub.id9.cc/sub?target=clash&new_name=true&url=订阅链接&list=true&emoji=false&udp=true&sort=true&fdn=true
    interval: 86400

#💡 本地代理服务（支持ss，ssr，socks5，http，vmess，vless，trojan，hysteria，snellm,tuic协议类型）
proxies:

