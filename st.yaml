#>2022.07.03
#参考：https://stash.wiki/features/example-config

#💡通用设置
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090

#💡服务提供商订阅
subscribe-url: https://proxy.service/stash/config

#服务提供商可以通过HTTP Response Header提供服务信息，包括：上行流量、下行流量、流量总量、过期时间
Subscription-Userinfo: upload=%f; download=%f; total=%f; expire=%f

#💡远程代理集（proxy-provider），能在后台自动从 URL 更新策略组
#要使用远程代理集，需要在 proxy-providers 下定义，并在proxy-groups中引用
proxy-providers:
  All:
    type: http
    url: "https://api.v1.mk/sub?target=clash&url=你的订阅链接&list=true&udp=true&emoji=true"
    # 以下方法任选其一⚠️有Clash订阅优先使用方法二❗️
    # 1.可以使用任意类型的链接仅替换上面文字，多个链接使用英文符号的竖杠|隔开一起写上即可
    # 2.Sub-Store与Clash类型订阅链接替换掉整个引号""内的链接
    interval: 86400
    path: ./all.yaml
    health-check:
      enable: true
      interval: 1800
      url: http://www.gstatic.com/generate_204

#💡dns服务器配置
支持UDP/TCP/DoT/DoH协议的DNS服务，可以指明具体的连接端口号
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 120.53.53.88
  - 120.53.53.13
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - 'openwrt.lan'

  nameserver:
  - https://doh-e4da7876.doh.pub/dns-query
  - tls://dot-e4da7876.dot.pub
  
 #对部分域名使用单独的 DNS 服务器
  nameserver-policy:
    '*.taobao.com': 223.5.5.5
    '*.tmall.com': 223.5.5.5
    '*.alipay.com': 223.5.5.5
    '*.alicdn.com': 223.5.5.5
    '*.aliyun.com': 223.5.5.5
    '*.qq.com': 119.29.29.29
    '*.jd.com': 119.29.29.29
    '*.weixin.com': 223.5.5.5
    '*.weiyun.com': 223.5.5.5
    '*.tencent.com': 223.5.5.5

#💡HTTP引擎相关
  # 强制使用 HTTP 引擎处理 TCP 连接
  # 捕获后的连接可以使用高级功能，例如重写和脚本
http:
  force-http-engine:
    - '*:80'
    - '*:4480' # BiliBili CDN
    - '*:9102' # BiliBili CDN

#以 PKCS #12 编码的 CA 证书
  ca: ''

#证书密码
  ca-passphrase: ''

#开启 MitM 功能的域名列表，需要确保上述 CA 证书已受系统信任
  mitm:
    - g.cn
    - '*.google.cn'

#HTTP(S) 重写，支持header、302、307、reject多种策略
  url-rewrite:
    - ^http://g\.cn http://www.google.com header # 重写请求头的域名
    - ^https?://www\.google\.cn https://www.google.com 302 # 直接返回一个 302 重定向的响应
    - ^https?://ad\.example - reject # 拒绝请求

#使用 JavaScript 脚本改写 HTTP(S) 请求
  script:
    - match: https://weather-data.apple.com/v2/weather/[\w-]+/-?[0-9]+\.[0-9]+/-?[0-9]+\.[0-9]+\?
      name: weather-us-aqi # 引用script-providers中的脚本
      type: response # 脚本类型：request / response
      require-body: true # 如果需要 request / response body，请设置为 true
      timeout: 10 # script timeout in second (optional)
      # debug: false # 开发模式，每次执行前会从 provider 加载最新脚本

script-providers:
  weather-us-aqi:
#远程资源模式
    url: https://raw.githubusercontent.com/STASH-NETWORKS-LIMITED/stash-example/main/script/iOS15_Weather_AQI_Standard.js
    interval: 86400

script:
  shortcuts: #使用 Python 脚本编写自定义规则
    # 4483 与 9305 为 BiliBili 的 QUIC CDN
    quic: network == 'udp' and (dst_port == 443 or dst_port == 4483 or dst_port == 9305) # 可以在 rule 中引用
#支持通配符域名 (例如: *.clash.dev, *.foo.*.example.com )
#不使用通配符的域名优先级高于使用通配符的域名 (例如: foo.example.com > *.example.com > .example.com )
#注意: +.foo.com 的效果等同于 .foo.com 和 foo.com

hosts:
  '*.clash.dev': 127.0.0.1
  '.dev': 127.0.0.1
  'alpha.clash.dev': '::1'

#💡proxies代理
#支持多种类型的代理协议ss、ssr、socks5、http、vmess、snell、trojan、hysteria、vless、tuic
proxies:

#💡策略组（proxy-groups）是一系列代理（或策略组）的组合。策略组可以像单个代理一样被分流规则引用，并可以指定特殊的策略提高可用性。
#select: 用来允许用户手动选择
#load-balance: 能充分利用多个代理的带宽
#url-test: 可以定时与指定 URL 测速后，自动选择延迟最短的服务器
#fallback: 可以尽量按照用户书写的服务器顺序，在确保服务器可用的情况下，由上至下自动选择服务器
#relay: 代理的转发链, 流量将通过一系列的代理转发到达目的地
#ssid-group: 为 select 的特例，可以根据设备的 SSID 自动切换

