#>2022.07.02
mixed-port: 7890
mode: rule
log-level: info

#本地dns服务器
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: []

  default-nameserver:
  - 120.53.53.88
  - 120.53.53.13

  nameserver:
  - https://doh-e4da7876.doh.pub/dns-query
  - tls://dot-e4da7876.dot.pub

  fallback:
  - https://cloudflare-dns.com/dns-query
  - https://1.1.1.1/dns-query
  - https://dns.google/dns-query
  
#重写
http:
  mitm:
  - g.cn
  - "*.google.cn"
  rewrite:
  - ^https?:\/\/(www.)?(g|google)\.cn https://www.google.com 302

#订阅链接
subscribe-url: https://www.naiun.co/api/v1/client/subscribe?token=02545c243d079d203c3e76b75ab3d923
remote-resources-default-config:
  type: http
  interval: 86400


#远程代理集
proxy-providers:
  all-sub:
    <<:
      type: http
      interval: 86400
    url: "https://sub.store/download/collection/subs"
    path: ./all.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
      
  Hong Kong:
    <<: *All
    filter: 港|香港|HK|Hong

  Taiwan:
    <<: *All
    filter: 台|台湾|台北|TW|Taiwan

  Japan:
    <<: *All
    filter: 日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    
  Korean:
    <<: *All
    filter: 韩国|韓國|朝鲜|KR|Korean

  Singapore:
    <<: *All
    filter: 新加坡|坡|狮城|SG|Singapore

  American:
    <<: *All
    filter: 美|美国|美國|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|American|United States
    
  Chinese:
    <<: *All
    filter: 移动|联通|电信|腾讯|阿里|CHINA|CN|中国|华东|华南|华中|华西|华北|北京|上海|重庆|天津|广东|广州|深圳|湖北|武汉|宜昌|江苏|南京|无锡|镇江|苏州|浙江|杭州|宁波|温州|绍兴|云南|昆明|贵州|贵阳|四川|成都|福建|福州|厦门|海南|海口|湖南|长沙|安徽|合肥|江西|南昌|河南|郑州|河北|石家庄|山东|济南|山西|太原|陕西|西安|辽宁|沈阳|吉林|长春|广西|南宁|宁夏|银川|青海|西宁|甘肃|兰州|黑龙江|哈尔滨|辽宁|沈阳|内蒙古|呼和浩特|新疆|乌鲁木齐|西藏|拉萨   

