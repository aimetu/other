tun:
  enable: true
  stack: system
  dns-hijack:
    - 198.18.0.2:53
  auto-route: true
  auto-detect-interface: true
cfw-bypass:
    - localhost
    - 127.*
    - 10.*
    - 172.16.*
    - 172.17.*
    - 172.18.*
    - 172.19.*
    - 172.20.*
    - 172.21.*
    - 172.22.*
    - 172.23.*
    - 172.24.*
    - 172.25.*
    - 172.26.*
    - 172.27.*
    - 172.28.*
    - 172.29.*
    - 172.30.*
    - 172.31.*
    - 192.168.*
    - <local>
cfw-latency-timeout: 5000

proxy-providers:
  ssr:
    type: http
    url: "https://sub.id9.cc/sub?target=clash&&url=订阅链接&list=true&emoji=true&udp=true&sort=true&fdn=true"
    interval: 3600
    path: ./ssr.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
      
proxy-groups:
  - name: 🔰 节点选择
    type: select
    use:
      - ssr
    proxies:
      - ♻️ 自动选择
      - 🎯 中国直连
      
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - ssr
      
  - name: 🎯 中国直连
    type: select
    proxies:
      - DIRECT
      - ♻️ 自动选择  
      
  - name: 🌍 海外加速
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择
      - DIRECT
      
  - name: 📲 电报群聊
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - ♻️ 自动选择
      
  - name: 🕸️ 局域网
    type: select
    proxies:
      - DIRECT
      
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🔰 节点选择
      - 🎯 中国直连
      - 🌍 海外加速
      
  - name: 🍃 广告净化
    type: select
    proxies:
      - REJECT
      - DIRECT
      
rule-providers:
  直连域名:
    behavior: domain
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  中国IP:
    behavior: ipcidr
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  局域网:
    behavior: domain
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400
    
  代理域名:
    behavior: domain
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  gfw域名:
    behavior: domain
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  广告域名:
    behavior: domain
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  隐私域名:
    behavior: domain
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  苹果服务:
    behavior: domain
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  电报群聊:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

rules:
  - DOMAIN-KEYWORD,gimytv,🎯 中国直连
  - DOMAIN-KEYWORD,libvio,🎯 中国直连
  - DOMAIN-KEYWORD,btbdys,🎯 中国直连
  - DOMAIN-KEYWORD,cokemv,🎯 中国直连
  - RULE-SET,直连域名,🎯 中国直连
  - RULE-SET,中国IP,🎯 中国直连
  - RULE-SET,局域网,🕸️ 局域网
  - RULE-SET,代理域名,🌍 海外加速
  - RULE-SET,gfw域名,🌍 海外加速
  - RULE-SET,广告域名,🍃 广告净化
  - RULE-SET,隐私域名,🍃 广告净化
  - RULE-SET,苹果服务,🍎 苹果服务
  - RULE-SET,电报群聊,📲 电报群聊
  - GEOIP,CN,🎯 中国直连
  - MATCH,🐟 漏网之鱼
