      - ♻️ 自动选择

  - name: 🎶 声田音乐
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择
      
  - name: 🎮 国际游戏
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择  

  - name: 🖥️ 微软服务
