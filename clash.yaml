#>2022.07.03
port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090

dns:
  enable: true
  enhanced-mode: fake-ip # 或 redir-host
  #fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - 'dns.msftncsi.com'
    - 'www.msftncsi.com'
    - 'www.msftconnecttest.com'
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    
tun:
  enable: true
  stack: system
  #stack: gvisor
  #dns-hijack:
  #  - 198.18.0.2:53
  auto-route: true
  auto-detect-interface: true # 自动检测出口网卡
cfw-bypass:
    - localhost
    - 127.*
    - 10.*
    - 172.16.*
    - 172.17.*
    - 172.18.*
    - 172.19.*
    - 172.20.*
    - 172.21.*
    - 172.22.*
    - 172.23.*
    - 172.24.*
    - 172.25.*
    - 172.26.*
    - 172.27.*
    - 172.28.*
    - 172.29.*
    - 172.30.*
    - 172.31.*
    - 192.168.*
    - <local>
cfw-latency-timeout: 5000

proxy-providers:
  ssr:
    type: http
    url: "https://sub.id9.cc/sub?target=clash&&url=订阅链接"
    interval: 3600
    path: ./ssr.yaml
    health-check:
      enable: true
      interval: 600
      # lazy: true
      url: http://www.gstatic.com/generate_204
      
proxy-groups:
  - name: 🔰 节点选择
    type: select
    use:
      - ssr
    proxies:
      - ♻️ 自动选择
      - 🎯 中国直连
      
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - ssr
  - name: 🎯 中国直连
    type: select
    proxies:
      - DIRECT
      - ♻️ 自动选择  
      
  - name: 🌍 全球加速
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择
      - DIRECT
      
  - name: 📲 电报信息
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择
      
  - name: 🚈 专业驾驶
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择
      
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🔰 节点选择
      - 🎯 中国直连
      - 🌍 全球加速

rule-providers:
  direct:
    behavior: "domain"
    type: http
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400
    
  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400
    
  gfw:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400
    
rules:
  - DOMAIN-KEYWORD,gimytv,🎯 中国直连
  - DOMAIN-KEYWORD,libvio,🎯 中国直连
  - DOMAIN-KEYWORD,btbdys,🎯 中国直连
  - DOMAIN-KEYWORD,cokemv,🎯 中国直连
  - RULE-SET,direct,🎯 中国直连
  - RULE-SET,gfw,🌍 全球加速
  - RULE-SET,telegramcidr,📲 电报信息
  - GEOIP,CN,DIRECT
  - MATCH,🐟 漏网之鱼
