#>2022.07.06
port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  enhanced-mode: fake-ip
  ake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time1.*.com
    - time2.*.com
    - time3.*.com
    - time4.*.com
    - time5.*.com
    - time6.*.com
    - time7.*.com
    - ntp.*.com
    - ntp1.*.com
    - ntp2.*.com
    - ntp3.*.com
    - ntp4.*.com
    - ntp5.*.com
    - ntp6.*.com
    - ntp7.*.com
    - "*.time.edu.cn"
    - "*.ntp.org.cn"
    - "+.pool.ntp.org"
   
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
          
tun:
  enable: true
  stack: system
  dns-hijack:
    - 198.18.0.2:53
  auto-route: true
  auto-detect-interface: true
cfw-bypass:
    - localhost
    - 127.*
    - 10.*
    - 172.16.*
    - 172.17.*
    - 172.18.*
    - 172.19.*
    - 172.20.*
    - 172.21.*
    - 172.22.*
    - 172.23.*
    - 172.24.*
    - 172.25.*
    - 172.26.*
    - 172.27.*
    - 172.28.*
    - 172.29.*
    - 172.30.*
    - 172.31.*
    - 192.168.*
    - <local>
cfw-latency-timeout: 5000

proxy-providers:
  clash:
    type: http
    url: "https://sub.id9.cc/sub?target=clash&&url=订阅链接&list=true&emoji=true&udp=true&sort=true&fdn=true"
    interval: 3600
    path: ./clash.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
      
proxy-groups:
  - name: 🔰 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
    use:
      - clash     
      
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - clash
      
  - name: 🕸️ speedtest
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择
      - ♻️ 自动选择
      
  - name: 🎶 spotify
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择
      
  - name: ✉️ telegram
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 🎵 tiktok
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 🎞️ youtube
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 📼 disney
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 📽️ netflix
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 📺 hbo
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 🎮 国际游戏
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择  
      
  - name: 🖥️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择
      
  - name: 📟 谷歌服务
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 🎬 国际媒体
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 🌐 国际网络
    type: select
    proxies:
      - 🔰 节点选择
      - ♻️ 自动选择

  - name: 📹 中国媒体
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择

  - name: 🇨🇳 中国直连
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT
      - REJECT
      
  - name: ⛔ 广告净化
    type: select
    proxies:
      - REJECT
      - DIRECT
      
