rules:
  - RULE-SET,✉️ 电报群聊,✉️ 电报群聊
  - RULE-SET,🍎 苹果云盘,🍎 苹果服务
  - RULE-SET,🍎 苹果服务,🍎 苹果服务
  - RULE-SET,📟 谷歌服务,📟 谷歌服务
  - RULE-SET,🌐 gfw域名,🌐 国际网络
  - RULE-SET,🌐 greatfire域名,🌐 国际网络
  - RULE-SET,🌐 代理域名,🌐 国际网络
  - RULE-SET,🌐 国外域名,🌐 国际网络
  - RULE-SET,🇨🇳 直连域名,🇨🇳 中国直连
  - RULE-SET,🇨🇳 大陆IP,🇨🇳 中国直连
  - RULE-SET,🇨🇳 常见软件,🇨🇳 中国直连
