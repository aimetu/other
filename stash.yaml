#>2022.07.03
mode: rule
log-level: info

dns:
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
    
  fake-ip-filter:
  - "+.stun.*.*"
  - "+.stun.*.*.*"
  - "+.stun.*.*.*.*"
  - "+.stun.*.*.*.*.*"
  - "lens.l.google.com"
  - "*.n.n.srv.nintendo.net"
  - "+.stun.playstation.net"
  - "xbox.*.*.microsoft.com"
  - "*.*.xboxlive.com"
  - "*.msftncsi.com"
  - "*.msftconnecttest.com"
  - "*.mcdn.bilivideo.cn"
  
http:
  url-rewrite:
  - ^https?:\/\/(www.)?(g|google)\.cn https://www.google.com 302
script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443
    
subscribe-url: 填写订阅链接

proxy-providers:
  all:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true
    
  ss:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true
    
  ssr:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true

  vmess:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true

  vless:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true

  trojan:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true
    
