#>2022.07.05

#💡通用配置
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

#💡dns服务器配置
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  skip-cert-verify: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - localhost.ptlogin2.qq.com
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.xboxlive.com'
    - 'msftconnecttest.com'
    - 'xbox.*.microsoft.com'
    - '*.battlenet.com.cn'
    - '*.battlenet.com'
    - '*.blzstatic.cn'
    - '*.battle.net'
    
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - system
  
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

#对域名指定单独的dns服务器
  nameserver-policy:
    '*testflight.apple.com': 23.76.66.98
    
#💡http引擎相关
http:
#开启mitm功能的域名列表
  mitm:
    - g.cn
    - '*.google.cn'
    - *.tiktokv.com
    - *.byteoversea.com
    - *.tik-tokapi.com

#http(s)重写，支持header、302、307、reject多种策略
  url-rewrite:
    - ^http://g\.cn http://www.google.com header
    - ^https?://www\.google\.cn https://www.google.com 302
    - (?<=_region=)CN(?=&) url 307 KR
    - (?<=&mcc_mnc=)4 url 307 2
    - ^(https?:\/\/(tnc|dm)[\w-]+\.\w+\.com\/.+)(\?)(.+) url 302  $1$3
    - (?<=\d\/\?\w{7}_\w{4}=)1[6-9]..(?=.?.?&) url 307 17

  hosts:
    '*.clash.dev': 127.0.0.1

#💡机场流量信息在主页显示
subscribe-url: 填写订阅链接

#💡远程机场订阅链接
proxy-providers:
  all:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true
    
  ss:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true
    
  ssr:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true

  vmess:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true

  vless:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true

  trojan:
    interval: 86400
    type: http
    url: https://sub.id9.cc/sub?target=clash&url=填写订阅链接&list=true&udp=true&emoji=true

